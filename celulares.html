
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JKOD Tech | Celulares</title>
<style>
:root{
  --bg:#f5f7fa;
  --card:#ffffff;
  --text:#1e293b;
  --muted:#64748b;
  --brand:#16a34a;
  --shadow:0 10px 25px rgba(0,0,0,.08);
  --max:1100px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:var(--bg);
  color:var(--text);
}
.container{
  padding:20px;
  max-width:var(--max);
  margin:auto;
}
/* HEADER */
.header{
  background:white;
  padding:20px;
  box-shadow:var(--shadow);
  margin-bottom:20px;
}
.header h1{margin:0;}
.header p{
  margin:5px 0 0;
  color:var(--muted);
}
/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}
/* CARD */
.card{
  background:var(--card);
  border-radius:20px;
  padding:15px;
  box-shadow:var(--shadow);
  text-align:center;
}
.card img{
  width:100%;
  height:200px;
  object-fit:contain;
  margin-bottom:10px;
}
.card h3{
  margin:10px 0 5px;
}
.card p{color:var(--muted);margin:0 0 10px;}
.btn{
  background:linear-gradient(180deg,#22c55e,#16a34a);
  border:none;
  padding:12px;
  width:100%;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  color:#052e12;
}
/* WhatsApp flotante */
.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
  cursor:pointer;
}
.whatsapp-float img{
  width:35px;
}
</style>
</head>
<body>

<div class="header">
  <h1>Celulares</h1>
  <p>Consulta disponibilidad por WhatsApp</p>
</div>

<div class="container">

  <div class="grid">

    <!-- Samsung A54 -->
    <div class="card">
      <img src="https://i.postimg.cc/43R5DJ0k/dl6-Galaxy-A54-5G-Awesome-White-Front.jpg" alt="Samsung Galaxy A54">
      <h3>Samsung Galaxy A54</h3>
      <p>Disponible por pedido</p>
      <button class="btn" onclick="sendWhatsApp('Samsung Galaxy A54')">Preguntar</button>
    </div>

    <!-- Xiaomi 15T -->
    <div class="card">
      <img src="https://i.postimg.cc/nr99VmjV/xiaomistore-xiaomi15t-rosegold-2681208560.png" alt="Xiaomi 15T">
      <h3>Xiaomi 15T</h3>
      <p>Disponible por pedido</p>
      <button class="btn" onclick="sendWhatsApp('Xiaomi 15T')">Preguntar</button>
    </div>

    <!-- iPhone referencia (si quieres ir manteniendo) -->
    <div class="card">
      <img src="https://i.postimg.cc/CMnRqj5Y/IMG-14858911-3cb3c1ba-0b36-40ae-ad1a-4d5167b5852b.jpg" alt="iPhone referencia">
      <h3>iPhone (Ejemplo)</h3>
      <p>Consulta modelos por WhatsApp</p>
      <button class="btn" onclick="sendWhatsApp('iPhone modelos')">Preguntar</button>
    </div>

  </div>

</div>

<!-- Botón flotante WhatsApp -->
<div class="whatsapp-float" onclick="sendWhatsApp('Soporte celulares')">
  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
</div>

<script>
const NUMBER = "573244688713";

function sendWhatsApp(product){
  const message = `Hola JKOD Tech 👋%0AQuiero info sobre: ${product}%0A%0AMarca:%0APresupuesto:%0A¿Nuevo o usado?:`;
  window.open(`https://wa.me/${NUMBER}?text=${message}`, "_blank");
}
</script>

</body>
</html>
