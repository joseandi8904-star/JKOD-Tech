
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>JKOD Tech | Accesorios</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/2Sp3wgPg/file-00000000d19471f58bfa68979af441ec.png">

  <style>
    :root{--bg:#f6f7fb;--card:#fff;--line:#e7eaf2;--text:#0f172a;--muted:#475569;--brand:#16a34a;--brand2:#22c55e;--shadow:0 14px 34px rgba(15,23,42,.10);--max:1100px}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;color:var(--text);
      background:radial-gradient(1200px 500px at 20% 0%, rgba(34,197,94,.10), transparent 60%),
      radial-gradient(900px 400px at 90% 10%, rgba(34,197,94,.08), transparent 60%),var(--bg)}
    a{color:inherit;text-decoration:none}
    .container{max-width:var(--max);margin:0 auto;padding:0 16px}
    .topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
    .row{display:flex;align-items:center;gap:12px;padding:12px 0;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:10px;flex:1 1 260px;min-width:240px}

    /* ✅ LOGO IGUAL QUE CELULARES (LIMPIO, SOLO CÍRCULO) */
    .logo{width:50px;height:50px}
    .logo img{width:50px;height:50px;border-radius:50%;object-fit:cover}

    .pill{border:1px solid var(--line);background:#fff;padding:10px 12px;border-radius:999px;font-weight:900;display:inline-flex;gap:8px;align-items:center;
      box-shadow:0 10px 22px rgba(15,23,42,.06);cursor:pointer;user-select:none}
    .pill:hover{transform:translateY(-1px)}
    .card{background:#fff;border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);padding:16px;margin:14px 0}
    h1{margin:0 0 6px;font-size:22px}
    .sub{margin:0;color:var(--muted);line-height:1.4}
    .tabs{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 14px}
    .tab{padding:10px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:900;font-size:13px;transition:.15s transform}
    .tab:hover{transform:translateY(-1px)}
    .tab.active{background:rgba(34,197,94,.10);border-color:rgba(22,163,74,.20)}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    @media (max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:640px){.grid{grid-template-columns:1fr}}
    .item{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}
    .itemHead{padding:14px;border-bottom:1px solid rgba(0,0,0,.06);display:flex;justify-content:space-between;gap:10px}
    .itemHead h3{margin:0;font-size:15px}
    .price{font-weight:900;color:var(--brand);white-space:nowrap;font-size:13px}
    .desc{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.35}
    .tags{padding:10px 14px 0;display:flex;gap:8px;flex-wrap:wrap}
    .tag{font-size:12px;padding:6px 10px;border-radius:999px;border:1px solid rgba(0,0,0,.08);background:#f8fafc}
    .itemBody{padding:12px 14px 14px;display:grid;gap:10px}
    select,input{width:100%;padding:12px 12px;border-radius:12px;background:#fff;border:1px solid var(--line);color:var(--text);outline:none}
    @media (max-width:640px){select,input{font-size:16px}}
    .fieldRow{display:grid;grid-template-columns:1fr 120px;gap:10px;align-items:center}
    @media (max-width:420px){.fieldRow{grid-template-columns:1fr}}
    .qty{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px;border-radius:12px;border:1px solid var(--line);background:#fff;user-select:none}
    .qty button{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:#f8fafc;color:var(--text);font-weight:900;cursor:pointer}
    .qty span{min-width:26px;text-align:center;font-weight:900}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:2px}
    .btn{border:none;outline:none;border-radius:12px;padding:12px 14px;cursor:pointer;font-weight:900;transition:.15s transform;display:inline-flex;align-items:center;gap:10px;user-select:none}
    .btn:hover{transform:translateY(-1px)}
    .btnAdd{flex:1;border:1px solid rgba(22,163,74,.22);background:rgba(34,197,94,.08)}
    .btnBuy{flex:1;background:linear-gradient(180deg,var(--brand2),var(--brand));color:#052e12}
    footer{padding:18px 0 40px;color:var(--muted);border-top:1px solid rgba(0,0,0,.06);margin-top:18px;font-size:13px}
  </style>
</head>

<body>
  <div class="topbar">
    <div class="container">
      <div class="row">
        <a class="pill" href="./index.html">← <strong>Inicio</strong></a>

        <div class="brand">
          <div class="logo"><img src="https://i.postimg.cc/2Sp3wgPg/file-00000000d19471f58bfa68979af441ec.png" alt="JKOD Tech"></div>
          <div>
            <b>Accesorios</b>
            <div style="color:var(--muted);font-size:12px;margin-top:2px">Fundas, vidrios, cargadores, cables, power banks</div>
          </div>
        </div>

        <button class="pill" id="btnWhatsapp" type="button">💬 <strong>WhatsApp</strong></button>
      </div>
    </div>
  </div>

  <main class="container">
    <div class="card">
      <h1>Accesorios</h1>
      <p class="sub">Selecciona lo que necesitas y te abrimos WhatsApp con el mensaje listo. Si no ves tu modelo, pregúntanos igual.</p>

      <div class="tabs" id="tabs">
        <div class="tab active" data-tab="all">Todo</div>
        <div class="tab" data-tab="fundas">Fundas</div>
        <div class="tab" data-tab="vidrios">Vidrios</div>
        <div class="tab" data-tab="cargadores">Cargadores</div>
        <div class="tab" data-tab="cables">Cables</div>
        <div class="tab" data-tab="powerbanks">Power banks</div>
      </div>

      <div class="grid" id="productGrid"></div>
    </div>

    <footer>
      © <span id="year"></span> <b>JKOD Tech</b> · Accesorios · Colombia
    </footer>
  </main>

  <script>
    const WHATSAPP_NUMBER = "573244688713";
    document.getElementById("year").textContent = new Date().getFullYear();

    const ARMADURA_MODELS = [
      "Redmi A5","Redmi 12","Redmi 13C","Note 11","Note 14 4G","Note 13 Pro","Note 14 Pro","Poco X7",
      "Samsung A12","Samsung A13","Samsung A15","Samsung A21s","Samsung A22 4G","Samsung A35","Samsung A55","Samsung A56",
      "Moto G10 / G20 / G30","Moto G85","Oppo Reno 13","Oppo A60","Infinix Smart 10","Infinix Hot 50 Pro",
      "Honor X7C","Honor X8C","Honor X9C"
    ];

    const VIDRIO_MODELS = [
      "Samsung (escribe el modelo en WhatsApp)",
      "iPhone (escribe el modelo en WhatsApp)",
      "Xiaomi/Redmi (escribe el modelo en WhatsApp)",
      "Motorola (escribe el modelo en WhatsApp)",
      "Oppo (escribe el modelo en WhatsApp)",
      "Infinix (escribe el modelo en WhatsApp)",
      "Honor (escribe el modelo en WhatsApp)"
    ];

    const PRODUCTS = [
      {
        id:"armadura", tab:"fundas",
        name:"Funda Armadura",
        desc:"Protección reforzada y diseño resistente.",
        tags:["Alta protección","Agarre seguro","Stock"],
        price:0,
        needsModel:true,
        modelLabel:"Selecciona tu modelo",
        models:ARMADURA_MODELS,
        ctaBuy:"Preguntar por mi modelo"
      },
      {
        id:"vidrio", tab:"vidrios",
        name:"Vidrio templado Super X",
        desc:"Anti-rayones y protección para pantalla.",
        tags:["Super X","Pantalla","Fácil instalación"],
        price:0,
        needsModel:true,
        modelLabel:"Marca (modelo por WhatsApp)",
        models:VIDRIO_MODELS,
        ctaBuy:"Pedir por WhatsApp"
      },
      {
        id:"cargador-iphone", tab:"cargadores",
        name:"Cargador iPhone",
        desc:"Carga segura. Elige cable/adaptador.",
        tags:["iPhone","Carga","Calidad"],
        price:0,
        needsType:true,
        typeLabel:"Elige tipo",
        types:["Cable Lightning","Cable USB-C (iPhone 15/16)","Solo adaptador","Combo adaptador + cable"],
        ctaBuy:"Comprar"
      },
      {
        id:"cargador-android", tab:"cargadores",
        name:"Cargador Android (USB-C)",
        desc:"Para la mayoría de Android (Tipo C).",
        tags:["Android","USB-C","Fast"],
        price:0,
        needsType:true,
        typeLabel:"Elige tipo",
        types:["Cable USB-C","Adaptador USB-C","Combo adaptador + cable"],
        ctaBuy:"Comprar"
      },
      {
        id:"cables", tab:"cables",
        name:"Cables",
        desc:"Carga y datos. Elige el tipo.",
        tags:["Resistente","Rápido","Garantía"],
        price:0,
        needsType:true,
        typeLabel:"Tipo de cable",
        types:["USB-C a USB-C","USB-A a USB-C","USB-A a Lightning","USB-C a Lightning"],
        ctaBuy:"Comprar"
      },
      {
        id:"powerbank", tab:"powerbanks",
        name:"Power Bank",
        desc:"Batería portátil para emergencias.",
        tags:["Portátil","Energía","Viajes"],
        price:0,
        needsType:true,
        typeLabel:"Capacidad",
        types:["5,000 mAh","10,000 mAh","20,000 mAh"],
        ctaBuy:"Cotizar"
      }
    ];

    const grid = document.getElementById("productGrid");
    const tabs = document.querySelectorAll(".tab");
    let activeTab = "all";

    function buildSelect(options, placeholder){
      const sel = document.createElement("select");
      const opt0 = document.createElement("option");
      opt0.value = ""; opt0.textContent = placeholder;
      sel.appendChild(opt0);
      options.forEach(v=>{
        const o = document.createElement("option");
        o.value = v; o.textContent = v;
        sel.appendChild(o);
      });
      return sel;
    }

    function buildQty(){
      const wrap = document.createElement("div");
      wrap.className = "qty";
      const minus = document.createElement("button"); minus.type="button"; minus.textContent="−";
      const val = document.createElement("span"); val.textContent="1";
      const plus = document.createElement("button"); plus.type="button"; plus.textContent="+";
      minus.addEventListener("click", ()=> val.textContent = String(Math.max(1, Number(val.textContent)-1)));
      plus.addEventListener("click", ()=> val.textContent = String(Math.min(99, Number(val.textContent)+1)));
      wrap.append(minus,val,plus);
      wrap.getValue = ()=> Number(val.textContent);
      return wrap;
    }

    function openWhatsApp(message){
      const url = "https://wa.me/" + WHATSAPP_NUMBER + "?text=" + encodeURIComponent(message);
      window.open(url, "_blank");
    }

    function render(){
      grid.innerHTML = "";
      const list = PRODUCTS.filter(p => activeTab === "all" ? true : p.tab === activeTab);

      list.forEach(p=>{
        const card = document.createElement("div");
        card.className = "item";

        const head = document.createElement("div");
        head.className = "itemHead";

        const left = document.createElement("div");
        const h3 = document.createElement("h3"); h3.textContent = p.name;
        const d = document.createElement("div"); d.className="desc"; d.textContent = p.desc;
        left.append(h3, d);

        const pr = document.createElement("div");
        pr.className = "price";
        pr.textContent = "DM";

        head.append(left, pr);

        const tags = document.createElement("div");
        tags.className = "tags";
        (p.tags||[]).slice(0,3).forEach(t=>{
          const tag = document.createElement("div");
          tag.className = "tag"; tag.textContent = t;
          tags.appendChild(tag);
        });

        const body = document.createElement("div");
        body.className = "itemBody";

        let modelSelect = null;
        let typeSelect = null;

        if(p.needsModel){
          modelSelect = buildSelect(p.models, p.modelLabel || "Selecciona");
          body.appendChild(modelSelect);
        }
        if(p.needsType){
          typeSelect = buildSelect(p.types, p.typeLabel || "Selecciona");
          body.appendChild(typeSelect);
        }

        const row = document.createElement("div");
        row.className = "fieldRow";

        const note = document.createElement("input");
        note.placeholder = "Nota (color/detalle) opcional";
        note.maxLength = 60;

        const qty = buildQty();

        row.append(note, qty);
        body.appendChild(row);

        const actions = document.createElement("div");
        actions.className = "actions";

        const add = document.createElement("button");
        add.className = "btn btnAdd";
        add.type="button";
        add.textContent = "Agregar";

        const buy = document.createElement("button");
        buy.className = "btn btnBuy";
        buy.type="button";
        buy.textContent = p.ctaBuy || "Comprar";

        function buildMessage(){
          const q = qty.getValue();
          const model = modelSelect ? modelSelect.value.trim() : "";
          const type = typeSelect ? typeSelect.value.trim() : "";
          const n = note.value.trim();

          if(p.needsModel && p.id === "armadura" && !model){
            alert("Selecciona tu modelo para la funda Armadura.");
            return null;
          }
          if(p.needsType && !type){
            alert("Selecciona el tipo.");
            return null;
          }

          const lines = [];
          lines.push("Hola JKOD Tech 👋");
          lines.push("Quiero este producto:");
          lines.push(`- ${p.name} x${q}`);
          if(model) lines.push(`- Modelo: ${model}`);
          if(type) lines.push(`- Tipo: ${type}`);
          if(n) lines.push(`- Nota: ${n}`);
          lines.push("\n¿Disponibilidad y precio? ✅");
          return lines.join("\n");
        }

        add.addEventListener("click", ()=>{
          const msg = buildMessage();
          if(!msg) return;
          // "Agregar" aquí solo abre WhatsApp con el mensaje (simple y directo)
          openWhatsApp(msg);
        });

        buy.addEventListener("click", ()=>{
          const msg = buildMessage();
          if(!msg) return;
          openWhatsApp(msg);
        });

        actions.append(add, buy);
        body.appendChild(actions);

        card.append(head, tags, body);
        grid.appendChild(card);
      });
    }

    tabs.forEach(t=>{
      t.addEventListener("click", ()=>{
        tabs.forEach(x=>x.classList.remove("active"));
        t.classList.add("active");
        activeTab = t.dataset.tab;
        render();
      });
    });

    document.getElementById("btnWhatsapp").addEventListener("click", ()=>{
      openWhatsApp("Hola JKOD Tech 👋\nQuiero preguntar por accesorios.\n\nMarca y modelo:");
    });

    render();
  </script>
</body>
</html>
